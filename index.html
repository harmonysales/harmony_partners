<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하모니렌트카 영업 지식베이스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2236;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#f0eff4;--muted:#8b8a96;--accent:#0ea5e9;--accent-soft:rgba(14,165,233,.12);--accent-border:rgba(14,165,233,.35);--green:#10b981;--green-soft:rgba(16,185,129,.1);--amber:#f59e0b;--amber-soft:rgba(245,158,11,.1);--red:#f87171;--red-soft:rgba(248,113,113,.1);--purple:#a78bfa;--purple-soft:rgba(167,139,250,.1);--teal:#2dd4bf;--teal-soft:rgba(45,212,191,.1)}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
header{border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;background:rgba(10,15,30,.94);backdrop-filter:blur(12px);z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#0ea5e9,#2dd4bf);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700}
.logo-sub{font-size:11px;color:var(--muted)}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--muted);font-family:'DM Mono',monospace}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 65px)}
aside{border-right:1px solid var(--border);padding:20px 14px;position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto}
.aside-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;padding:0 8px;margin-bottom:8px;margin-top:20px}
.aside-label:first-child{margin-top:0}
.filter-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;text-align:left;transition:all .15s}
.filter-btn:hover{background:var(--surface);color:var(--text)}
.filter-btn.active{background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-border)}
.filter-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.filter-count{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;opacity:.6}
.tag-cloud{display:flex;flex-wrap:wrap;gap:5px;padding:0 2px}
.tag-chip{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.tag-chip:hover{border-color:var(--accent-border);color:var(--accent)}
.tag-chip.active{background:var(--accent-soft);border-color:var(--accent-border);color:var(--accent)}
main{padding:24px 28px}
.search-wrap{position:relative;margin-bottom:18px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
#search{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:11px 40px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
#search::placeholder{color:var(--muted)}
#search:focus{border-color:var(--accent-border)}
.clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;display:none}
.results-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.results-count{font-size:13px;color:var(--muted);font-family:'DM Mono',monospace}
.results-count span{color:var(--text);font-weight:500}
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;cursor:pointer;transition:all .18s;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card:hover{border-color:var(--border2);background:var(--surface2);transform:translateX(2px)}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:7px}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.badge{font-size:10px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px;flex-shrink:0;border:1px solid;white-space:nowrap}
.badge-script{background:var(--green-soft);color:var(--green);border-color:rgba(16,185,129,.25)}
.badge-product{background:var(--amber-soft);color:var(--amber);border-color:rgba(245,158,11,.25)}
.badge-rule{background:var(--red-soft);color:var(--red);border-color:rgba(248,113,113,.25)}
.badge-faq{background:var(--purple-soft);color:var(--purple);border-color:rgba(167,139,250,.25)}
.badge-process{background:var(--teal-soft);color:var(--teal);border-color:rgba(45,212,191,.25)}
.card-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:12px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.ctag{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.card-actions{display:flex;gap:8px}
.btn{font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:6px 13px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-border)}
.btn-primary:hover{background:var(--accent);color:#fff}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.4}
.empty h3{font-size:15px;color:var(--text);margin-bottom:6px}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;backdrop-filter:blur(4px)}
.detail-overlay.open{display:flex;align-items:flex-start;justify-content:flex-end}
.detail-panel{width:500px;max-width:100vw;height:100vh;background:var(--surface);border-left:1px solid var(--border2);overflow-y:auto;padding:28px;animation:slideIn .22s ease}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
.detail-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;float:right;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.detail-close:hover{background:var(--surface2);color:var(--text)}
.detail-badge{display:inline-block;margin-bottom:12px;margin-top:4px}
.detail-title{font-size:20px;font-weight:700;margin-bottom:8px;letter-spacing:-.4px;clear:both}
.detail-desc{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.7}
.detail-section{margin-bottom:20px}
.detail-section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.script-block{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:13px 15px;margin-bottom:8px}
.script-role{font-size:10px;font-family:'DM Mono',monospace;color:var(--accent);margin-bottom:5px}
.script-role.cust{color:var(--muted)}
.script-text{font-size:13px;color:var(--text);line-height:1.75}
.script-tip{font-size:12px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-style:italic}
.detail-table{width:100%;border-collapse:collapse;font-size:13px}
.detail-table th{text-align:left;padding:8px 10px;background:var(--bg);color:var(--muted);font-weight:500;font-size:11px;border-bottom:1px solid var(--border)}
.detail-table td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.detail-table tr:last-child td{border-bottom:none}
.rule-item{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--muted);padding:7px 0;border-bottom:1px solid var(--border)}
.rule-item:last-child{border-bottom:none}
.rule-icon{font-size:14px;flex-shrink:0;margin-top:1px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">HR</div>
    <div>
      <div class="logo-text">하모니렌트카 영업 지식베이스</div>
      <div class="logo-sub">Sales Knowledge Base 2026</div>
    </div>
  </div>
  <div class="header-right"><div class="pill" id="total-count">-- items</div></div>
</header>
<div class="layout">
  <aside>
    <div class="aside-label">카테고리</div>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)"><span class="filter-dot" style="background:#8b8a96"></span>전체<span class="filter-count" id="fc-all">0</span></button>
    <button class="filter-btn" data-filter="script" onclick="setFilter('script',this)"><span class="filter-dot" style="background:#10b981"></span>응대 스크립트<span class="filter-count" id="fc-script">0</span></button>
    <button class="filter-btn" data-filter="product" onclick="setFilter('product',this)"><span class="filter-dot" style="background:#f59e0b"></span>상품 안내<span class="filter-count" id="fc-product">0</span></button>
    <button class="filter-btn" data-filter="rule" onclick="setFilter('rule',this)"><span class="filter-dot" style="background:#f87171"></span>필수 규정<span class="filter-count" id="fc-rule">0</span></button>
    <button class="filter-btn" data-filter="faq" onclick="setFilter('faq',this)"><span class="filter-dot" style="background:#a78bfa"></span>자주 묻는 질문<span class="filter-count" id="fc-faq">0</span></button>
    <button class="filter-btn" data-filter="process" onclick="setFilter('process',this)"><span class="filter-dot" style="background:#2dd4bf"></span>계약 프로세스<span class="filter-count" id="fc-process">0</span></button>
    <div class="aside-label">태그</div>
    <div class="tag-cloud" id="tag-cloud"></div>
  </aside>
  <main>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" type="text" placeholder="키워드 검색 (예: 동반차, 사고, 해피콜, 위약금...)" oninput="render()">
      <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
    </div>
    <div class="results-meta"><div class="results-count" id="results-count"><span>0</span>개 항목</div></div>
    <div class="cards" id="cards"></div>
  </main>
</div>
<div class="detail-overlay" id="overlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" onclick="closeDetailBtn()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>
<script>
const DATA=[
{id:1,type:'script',title:'첫 인사 & 소개 스크립트',tags:['인사','첫통화','신규','콜드콜'],desc:'처음 연락하는 고객에게 하모니렌트카를 자연스럽게 소개하는 표준 스크립트입니다.',detail:{scenarios:[{label:'콜드콜 — 처음 연락',scripts:[{role:'rep',text:'"안녕하세요, 하모니렌트카의 [이름]입니다. 갑자기 연락드려서 실례가 됐다면 죄송합니다. 혹시 지금 잠깐 말씀 나눌 수 있을까요?"',tip:'짧게 시작. 시간을 먼저 묻는 게 핵심입니다.'},{role:'cust',text:'"네, 잠깐은 괜찮아요."'},{role:'rep',text:'"저희 하모니렌트카는 신용 문제로 차량 마련이 어려우신 분들도 자체 심사 기준으로 승인을 진행하고 있어요. 혹시 현재 차량 이용하고 계신가요?"',tip:'우리 상품의 차별점(신용 심사 유연)을 자연스럽게 녹이세요.'}]},{label:'통화 불가 시 대응',scripts:[{role:'cust',text:'"지금 바빠서요."'},{role:'rep',text:'"아, 바쁘신 거 충분히 이해합니다. 그럼 언제쯤 다시 연락드리면 될까요? 5분이면 충분합니다."',tip:'거절당해도 다음 약속을 잡는 것으로 마무리하세요.'}]}]}},
{id:2,type:'script',title:'렌트 vs 리스 vs 할부 설명 스크립트',tags:['렌트','리스','할부','비교','설명'],desc:'고객이 세 가지 방식의 차이를 헷갈려할 때 쉽게 설명하는 스크립트입니다.',detail:{scenarios:[{label:'"렌트랑 리스가 뭐가 달라요?"',scripts:[{role:'cust',text:'"렌트랑 리스가 뭐가 다른 거예요?"'},{role:'rep',text:'"쉽게 설명드리면요, 렌트는 영업용 번호판(하·허·호)을 달고 보험이 렌트료에 포함돼 있어요. 반면 리스는 자가용 번호판이고 보험을 따로 가입하셔야 해요. 사고 나셔도 렌트는 보험료 인상이 없다는 게 큰 장점이에요."',tip:'보험료 할증 없음이 가장 강력한 렌트의 셀링 포인트입니다.'},{role:'cust',text:'"할부는요?"'},{role:'rep',text:'"할부는 차량이 고객님 명의가 되지만 대출로 잡혀서 신용도에 영향이 가요. 렌트는 빌려타는 방식이라 대출로 잡히지 않아서 나중에 집 살 때도 대출 한도를 아낄 수 있어요."',tip:'신용점수 보호 포인트를 꼭 언급하세요.'}]}]}},
{id:3,type:'script',title:'장기렌트 장점 설명 스크립트',tags:['장기렌트','장점','절세','보험할증','신용'],desc:'장기렌트의 핵심 장점 6가지를 고객 눈높이에 맞게 설명하는 스크립트입니다.',detail:{scenarios:[{label:'"왜 렌트가 유리한가요?"',scripts:[{role:'rep',text:'"첫째, 초기 비용이 없어요. 취득세·자동차세·보험료가 모두 월 렌트료에 포함돼 있어서 목돈 없이 시작할 수 있어요."',tip:''},{role:'rep',text:'"둘째, 사고 나셔도 렌트료가 절대 오르지 않아요. 보험료 할증 걱정이 없으세요."',tip:'초보 운전자에게 매우 강력한 포인트입니다.'},{role:'rep',text:'"셋째, 대출로 잡히지 않아 신용점수에 영향이 없어요. 나중에 집 살 때 대출 한도가 유지됩니다."',tip:''},{role:'rep',text:'"개인사업자나 법인이시라면 월 렌트료 전체가 비용 처리돼서 세금도 절약하실 수 있어요."',tip:'절세 효과는 사업자 고객에게 매우 강력한 포인트입니다.'}]}]}},
{id:4,type:'script',title:'클레임 응대 스크립트',tags:['클레임','불만','민원','사고'],desc:'불만 고객을 진정시키고 해결책을 제시하는 단계별 응대 흐름입니다.',detail:{scenarios:[{label:'강한 불만 고객 응대',scripts:[{role:'cust',text:'"이게 말이 됩니까! 차에 문제가 있잖아요!"'},{role:'rep',text:'"많이 불편하셨겠습니다. 먼저 진심으로 사과드립니다. 정확히 어떤 문제가 발생했는지 말씀해 주시면 바로 해결 방법을 찾아드리겠습니다."',tip:'먼저 공감, 그 다음 해결. 절대 변명하지 마세요.'},{role:'rep',text:'"하모니 지정 공업사로 바로 연결해 드릴게요. 사고 접수는 1661-7977로 해주시면 됩니다."',tip:'해결책을 구체적으로 제시하고 빠른 조치를 약속하세요.'}]}]}},
{id:5,type:'script',title:'거절 고객 대응 스크립트',tags:['거절','반박','고민중','재연락','경쟁사'],desc:'고객이 구매를 거절하거나 망설일 때 대응하는 멘트 모음입니다.',detail:{scenarios:[{label:'"지금 당장은 필요 없어요"',scripts:[{role:'cust',text:'"지금 당장은 필요 없어요."'},{role:'rep',text:'"네, 충분히 이해합니다. 혹시 언제쯤 필요하실 것 같으세요? 그때 맞춰서 다시 연락드려도 될까요?"',tip:'거절을 미래 기회로 전환하세요.'}]},{label:'"다른 곳이랑 비교해볼게요"',scripts:[{role:'cust',text:'"다른 렌트사랑 비교해볼게요."'},{role:'rep',text:'"물론이죠. 다만 저희 하모니만의 가장 큰 차이는 신용 심사 기준이 훨씬 유연하다는 점이에요. 타사에서 거절당하셨던 분들도 저희에서 승인되는 경우가 많아요."',tip:'경쟁사와 차별화되는 하모니의 핵심 포인트를 강조하세요.'}]}]}},
{id:6,type:'script',title:'해피콜 사전 설명 스크립트',tags:['해피콜','계약','사전설명','녹취'],desc:'계약 전 고객에게 해피콜 절차를 미리 설명하는 스크립트입니다.',detail:{scenarios:[{label:'해피콜 사전 안내',scripts:[{role:'rep',text:'"계약이 완료되면 본사(02-1588-5802)에서 해피콜 전화가 오는데요, 반드시 받아주셔야 차량 출고가 진행됩니다."',tip:'고객이 해피콜을 못 받으면 출고가 지연됩니다. 꼭 강조하세요.'},{role:'rep',text:'"해피콜에서 운전자 범위, 약정 주행거리, 하이링크 단말기, 중도해지 위약금 같은 핵심 내용을 확인하실 거예요. 제가 미리 설명드린 내용들이라 편하게 답해주시면 됩니다."',tip:'사전 설명을 충분히 해두어야 해피콜에서 고객이 당황하지 않습니다.'}]}]}},

{id:21,type:'process',title:'계약 전체 흐름 (12단계)',tags:['계약흐름','프로세스','견적','탁송','해피콜'],desc:'상담부터 차량 인도까지 하모니렌트카 계약의 전체 12단계 흐름입니다.',detail:{rules:[{icon:'①',text:'견적 내기 — 파트너즈 사이트에서 차량 선택 및 견적 저장'},{icon:'②',text:'신청서 발송 — 저장견적 메뉴에서 고객에게 신청서 링크 발송'},{icon:'③',text:'계약금 입금 — 고객 신청서 작성 완료 후 가상계좌 자동 발급 (24시간 내 입금)'},{icon:'④',text:'계약정보 확인 — 바로시스템 사전확인 메뉴에서 고객정보·서류 검토'},{icon:'⑤',text:'자사 확인 — 바로시스템에서 사전확인 승인 처리'},{icon:'⑥',text:'계약상태 업데이트 — 계약진행조회 메뉴 확인'},{icon:'⑦',text:'계약서 발송 — 파트너즈 진행상태조회에서 고객에게 계약서 링크 발송'},{icon:'⑧',text:'잔금 입금 — 고객이 가상계좌로 잔금 납부 (계약금 입금일 포함 3일차 오후 6시까지)'},{icon:'⑨',text:'탁송 요청 — 파트너즈에서 날짜·방법·출발/도착지 입력 후 요청'},{icon:'⑩',text:'승인 대기 — 본사에서 해피콜 진행 (02-1588-5802, 반드시 받아야 출고)'},{icon:'⑪',text:'차량 인도 — 탁송 기사 운전해 고객 전달, 인수증 서명'},{icon:'⑫',text:'계약 완료 — 자사 최종 실행 처리 완료'}]}},

{id:23,type:'process',title:'바로시스템 & 파트너즈 안내',tags:['바로시스템','파트너즈','ERP','전산'],desc:'영업에 필요한 두 가지 전산 시스템의 주요 메뉴와 사용법을 안내합니다.',detail:{rules:[{icon:'🖥',text:'바로시스템 주소: 101.101.218.134:8080 (구글/엣지 주소창에 입력)'},{icon:'🖥',text:'파트너즈 사이트: https://harmonypartners.kr/'},{icon:'📋',text:'바로시스템: 고객관리 > 계약고객관리, 블랙컨슈머관리'},{icon:'📋',text:'바로시스템: 차량관리 > 차량현황판, 차종현황판, 차량사진'},{icon:'📋',text:'바로시스템: 계약관리 > 사전확인, 계약진행조회, 탁송관리'},{icon:'📋',text:'파트너즈: 견적내기, 즉시출고신차/중고, 입고예정, 공지사항, 저장견적, 진행상태조회'},{icon:'⚠️',text:'신청서 보내기는 반드시 저장견적 메뉴에서만 가능합니다'},{icon:'⚠️',text:'신청서 발송 완료 문구가 뜰 때까지 기다리세요 — 중복 발송 주의'}]}}
];
let currentFilter='all',activeTag='';
function allTags(){return[...new Set(DATA.flatMap(d=>d.tags))]}
function setFilter(f,el){currentFilter=f;activeTag='';document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('active'));render()}
function setTag(tag){activeTag=activeTag===tag?'':tag;currentFilter='all';document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));document.querySelector('[data-filter="all"]').classList.add('active');document.querySelectorAll('.tag-chip').forEach(c=>c.classList.toggle('active',c.dataset.tag===activeTag));render()}
function clearSearch(){document.getElementById('search').value='';document.getElementById('clear-btn').style.display='none';render()}
function getFiltered(){const q=document.getElementById('search').value.trim().toLowerCase();document.getElementById('clear-btn').style.display=q?'flex':'none';return DATA.filter(d=>{const tOk=currentFilter==='all'||d.type===currentFilter;const gOk=!activeTag||d.tags.includes(activeTag);const qOk=!q||d.title.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q)||d.tags.some(t=>t.includes(q));return tOk&&gOk&&qOk})}
const TL={script:'응대 스크립트',product:'상품 안내',rule:'필수 규정',faq:'자주 묻는 질문',process:'계약 프로세스'};
const TC={script:'badge-script',product:'badge-product',rule:'badge-rule',faq:'badge-faq',process:'badge-process'};
function render(){const list=getFiltered();document.getElementById('results-count').innerHTML=`<span>${list.length}</span>개 항목`;['all','script','product','rule','faq','process'].forEach(k=>{const el=document.getElementById('fc-'+k);if(el)el.textContent=k==='all'?DATA.length:DATA.filter(d=>d.type===k).length});document.getElementById('total-count').textContent=DATA.length+' items';const cards=document.getElementById('cards');if(!list.length){cards.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><h3>검색 결과가 없습니다</h3><p>다른 키워드나 태그로 검색해 보세요.</p></div>';return}cards.innerHTML=list.map(d=>`<div class="card" onclick="openDetail(${d.id})"><div class="card-head"><div class="card-title">${d.title}</div><span class="badge ${TC[d.type]}">${TL[d.type]}</span></div><div class="card-desc">${d.desc}</div><div class="card-tags">${d.tags.map(t=>`<span class="ctag">#${t}</span>`).join('')}</div><div class="card-actions"><button class="btn btn-primary" onclick="event.stopPropagation();openDetail(${d.id})">자세히 보기 →</button></div></div>`).join('')}
function buildTagCloud(){const cloud=document.getElementById('tag-cloud');allTags().forEach(t=>{const el=document.createElement('button');el.className='tag-chip';el.dataset.tag=t;el.textContent='#'+t;el.onclick=()=>setTag(t);cloud.appendChild(el)})}
function openDetail(id){const d=DATA.find(x=>x.id===id);if(!d)return;const content=document.getElementById('detail-content');let html=`<div style="clear:both;padding-top:4px"></div><span class="badge detail-badge ${TC[d.type]}">${TL[d.type]}</span><div class="detail-title">${d.title}</div><div class="detail-desc">${d.desc}</div>`;if(d.detail.scenarios){d.detail.scenarios.forEach(s=>{html+=`<div class="detail-section"><div class="detail-section-label">${s.label}</div>`;s.scripts.forEach(sc=>{html+=`<div class="script-block"><div class="script-role ${sc.role==='cust'?'cust':''}">${sc.role==='rep'?'▶ 영업담당자':'고객'}</div><div class="script-text">${sc.text}</div>${sc.tip?`<div class="script-tip">💡 ${sc.tip}</div>`:''}</div>`});html+='</div>'})}if(d.detail.table){html+=`<div class="detail-section"><div class="detail-section-label">기준표</div><table class="detail-table"><tr>${d.detail.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr>${d.detail.table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table></div>`}if(d.detail.rules){html+=`<div class="detail-section"><div class="detail-section-label">상세 안내</div>`;d.detail.rules.forEach(r=>{html+=`<div class="rule-item"><span class="rule-icon">${r.icon}</span><span>${r.text}</span></div>`});html+='</div>'}content.innerHTML=html;document.getElementById('overlay').classList.add('open')}
function closeDetail(e){if(e.target===document.getElementById('overlay'))closeDetailBtn()}
function closeDetailBtn(){document.getElementById('overlay').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetailBtn()});
buildTagCloud();render();
</script>
